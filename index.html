<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5f2eb">
<title>Trackr — UK Live Trains</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#f5f2eb;--warm:#ede8df;--paper:#faf8f4;--ink:#1a1208;--ink2:#3d3527;
  --muted:#9b9080;--rule:#ddd8ce;--green:#2d6a4f;--green-bg:#eaf3ee;
  --amber:#b5620f;--amber-bg:#fdf2e4;--red:#c0392b;--red-bg:#fdecea;
  --serif:'Playfair Display',Georgia,serif;--sans:'Outfit',sans-serif;--accent:#e85d26;
}
html,body{height:100%;background:var(--cream);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--cream);}

/* HEADER */
header{padding:22px 24px 0;flex-shrink:0;}
.header-row{display:flex;align-items:flex-start;justify-content:space-between;}
.wordmark{font-family:var(--serif);font-weight:900;font-size:34px;line-height:0.9;letter-spacing:-2px;}
.wordmark em{font-style:italic;color:var(--accent);}
.header-right{display:flex;gap:7px;align-items:center;margin-top:5px;}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--green-bg);color:var(--green);border:1px solid rgba(45,106,79,0.2);border-radius:20px;padding:5px 10px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.8s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.hdr-btn{background:var(--paper);border:1.5px solid var(--rule);border-radius:20px;padding:5px 11px;font-size:11px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:4px;white-space:nowrap;}
.hdr-btn .s{color:#e8a020;}
.header-rule{height:1px;background:var(--rule);margin:14px 0 0;}

/* SEARCH */
.search-section{padding:16px 24px 0;flex-shrink:0;}
.search-box{background:var(--paper);border:1.5px solid var(--rule);border-radius:20px;position:relative;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.station-field{display:flex;align-items:center;padding:13px 18px;gap:12px;position:relative;}
.station-field:first-of-type{border-bottom:1.5px solid var(--rule);}
.field-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--serif);flex-shrink:0;}
.field-icon.from{background:var(--ink);color:var(--cream);}
.field-icon.to{background:var(--accent);color:white;}
.field-wrap{flex:1;position:relative;}
.field-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1px;}
.station-input{width:100%;background:transparent;border:none;outline:none;font-family:var(--sans);font-size:15px;font-weight:500;color:var(--ink);caret-color:var(--accent);}
.station-input::placeholder{color:var(--rule);}
.swap-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:32px;height:32px;background:var(--cream);border:1.5px solid var(--rule);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);z-index:5;transition:all 0.2s;}
.swap-btn:active{background:var(--ink);border-color:var(--ink);}
.swap-btn:active svg{color:white;}
.swap-btn svg{width:14px;height:14px;color:var(--ink2);}
.inp-clear{display:none;position:absolute;right:46px;top:50%;transform:translateY(-50%);background:var(--cream);border:none;cursor:pointer;font-size:15px;color:var(--muted);padding:4px 6px;line-height:1;z-index:20;border-radius:50%;}
.inp-clear.show{display:block;}

/* DATE/TIME CONTROLS */
.dt-controls{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.dt-row1{display:flex;gap:6px;align-items:center;}
.dt-row2{display:none;background:var(--paper);border:1.5px solid var(--rule);border-radius:14px;padding:10px 14px;gap:0;}
.dt-row2.show{display:flex;flex-direction:column;gap:8px;}
.dt-field{display:flex;align-items:center;gap:8px;}
.dt-field:first-child{padding-bottom:8px;border-bottom:1px solid var(--rule);}
.dt-field-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);width:36px;flex-shrink:0;}
.dt-field input{flex:1;border:none;background:transparent;font-family:var(--sans);font-size:14px;font-weight:500;color:var(--ink);outline:none;}
.dt-tab{flex-shrink:0;font-size:11px;font-weight:500;color:var(--muted);padding:6px 13px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;background:transparent;transition:all 0.15s;font-family:var(--sans);}
.dt-tab.active{color:var(--ink);background:var(--paper);border-color:var(--rule);box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.go-btn{margin-left:auto;flex-shrink:0;background:var(--ink);color:var(--cream);border:none;padding:8px 20px;border-radius:20px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.go-btn:active{transform:scale(0.97);}

/* AUTOCOMPLETE */
.ac-dd{display:none;position:absolute;top:calc(100% + 6px);left:-1.5px;right:-1.5px;background:var(--paper);border:1.5px solid var(--rule);border-radius:16px;z-index:400;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,0.13);max-height:260px;overflow-y:auto;scrollbar-width:none;}
.ac-dd::-webkit-scrollbar{display:none;}
.ac-dd.open{display:block;}
.ac-it{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--rule);transition:background 0.1s;}
.ac-it:last-child{border-bottom:none;}
.ac-it.all-term{background:rgba(232,93,38,0.06);border-bottom:1px solid var(--rule);}
.ac-it.all-term .ac-crs{color:var(--accent);}
.ac-it.all-term .ac-nm{color:var(--accent);font-weight:600;}
.ac-crs{font-family:var(--serif);font-weight:700;font-size:12px;color:var(--accent);width:30px;flex-shrink:0;}
.ac-nm{font-size:13px;font-weight:500;color:var(--ink);}
.ac-nm mark{background:none;color:var(--accent);font-weight:600;}

/* SECTIONS */
.sec{padding:10px 24px 0;flex-shrink:0;}
.sec-hd{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.chip-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.chip-row::-webkit-scrollbar{display:none;}
.pop-chip{flex-shrink:0;display:flex;flex-direction:column;background:var(--paper);border:1.5px solid var(--rule);border-radius:8px;padding:5px 10px;cursor:pointer;transition:all 0.15s;min-width:80px;}
.pop-chip:active{border-color:var(--accent);background:var(--warm);}
.pop-r{font-size:11px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:3px;}
.pop-a{color:var(--muted);font-size:10px;}
.pop-l{font-size:9px;color:var(--muted);margin-top:1px;}
.fav-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;background:var(--paper);border:1.5px solid rgba(232,160,32,0.4);border-radius:8px;padding:5px 9px;cursor:pointer;transition:all 0.15s;max-width:140px;}
.fav-chip:active{background:var(--warm);}
.fav-star-sm{color:#e8a020;font-size:11px;flex-shrink:0;}
.fav-nm{font-size:10px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fav-sub{font-size:9px;color:var(--muted);}

/* DIVIDER */
.divider{height:1px;background:var(--rule);margin:14px 24px 0;}

/* RESULTS */
.results-section{flex:1;overflow-y:auto;padding:12px 24px 32px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.results-section::-webkit-scrollbar{display:none;}

/* STATES */
.loading-state{display:none;padding:8px 0;}
.loading-state.show{display:block;}
.loading-lbl{font-size:12px;color:var(--muted);font-weight:500;text-align:center;margin-bottom:12px;}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton-card{background:var(--paper);border:1.5px solid var(--rule);border-radius:16px;padding:18px 16px;margin-bottom:10px;}
.skel{border-radius:6px;background:linear-gradient(90deg,var(--rule) 25%,var(--warm) 50%,var(--rule) 75%);background-size:400px 100%;animation:shimmer 1.3s ease-in-out infinite;}
.skel-time{height:30px;width:48%;margin-bottom:10px;}
.skel-info{height:13px;width:60%;margin-bottom:8px;}
.skel-info.short{width:38%;}
.skel-foot{height:11px;width:50%;margin-top:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{padding:48px 0;text-align:center;}
.empty-ico{font-family:var(--serif);font-size:48px;font-weight:900;font-style:italic;color:var(--rule);line-height:1;margin-bottom:10px;}
.empty-ttl{font-size:16px;font-weight:600;color:var(--ink2);margin-bottom:4px;}
.empty-sub{font-size:12px;color:var(--muted);}
.err-box{background:var(--red-bg);border:1.5px solid rgba(192,57,43,0.2);border-radius:14px;padding:14px 16px;margin-bottom:12px;font-size:13px;color:var(--red);line-height:1.6;}
.err-box strong{display:block;margin-bottom:3px;font-size:14px;}

/* RESULT HEADER */
.res-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;}
.res-rt{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--ink);flex:1;line-height:1.1;}
.res-ct{font-size:11px;color:var(--muted);font-weight:500;}

/* TRAIN CARD */
.train-card{background:var(--paper);border:1.5px solid var(--rule);border-radius:16px;margin-bottom:9px;overflow:hidden;cursor:pointer;transition:border-color 0.15s,transform 0.15s;animation:fadeUp 0.28s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.train-card:active{transform:scale(0.99);border-color:var(--ink2);}
.train-card.delayed{border-left:4px solid var(--amber);}
.train-card.cancelled{border-left:4px solid var(--red);opacity:0.7;}
.train-card.on-time{border-left:4px solid var(--green);}
.card-body{padding:13px 15px 10px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;}
.tc{display:flex;flex-direction:column;gap:2px;}
.dep{font-family:var(--serif);font-size:24px;font-weight:700;line-height:1;color:var(--ink);letter-spacing:-0.5px;}
.arr{font-size:11px;color:var(--muted);}
.mc{display:flex;flex-direction:column;align-items:center;gap:4px;}
.dur-lbl{font-size:10px;font-weight:600;color:var(--muted);}
.rail-line{width:100%;height:1.5px;background:var(--rule);position:relative;}
.rail-line::before,.rail-line::after{content:'';position:absolute;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:var(--muted);}
.rail-line::after{right:0;}
.stops-tag{font-size:10px;color:var(--muted);font-weight:500;}
.stops-tag.direct{color:var(--green);font-weight:600;}
.rc{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.sc{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;}
.sc.on-time{background:var(--green-bg);color:var(--green);}
.sc.delayed{background:var(--amber-bg);color:var(--amber);}
.sc.cancelled{background:var(--red-bg);color:var(--red);}
.plt-tag{font-size:11px;color:var(--muted);}
.plt-tag strong{color:var(--ink);}
.card-foot{padding:7px 15px;border-top:1px solid var(--rule);display:flex;align-items:center;gap:8px;}
.opr{font-size:11px;color:var(--muted);flex:1;}
.fav-btn{font-size:16px;cursor:pointer;transition:transform 0.15s;color:var(--rule);line-height:1;padding:2px;}
.fav-btn.starred{color:#e8a020;}
.fav-btn:active{transform:scale(1.35);}

/* LOAD MORE / EARLIER */
.page-btn{width:100%;padding:12px;background:var(--paper);border:1.5px solid var(--rule);border-radius:13px;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer;display:none;align-items:center;justify-content:center;gap:7px;transition:all 0.15s;margin-bottom:9px;}
.page-btn.show{display:flex;}
.page-btn:active,.page-btn:hover{background:var(--warm);}
.page-btn.busy{opacity:0.55;pointer-events:none;}
#btnLater{margin-top:4px;margin-bottom:0;}

/* TRAIN DASHBOARD (v2.0) */
.dash-overlay{display:none;position:fixed;inset:0;background:var(--cream);z-index:600;flex-direction:column;}
.dash-overlay.open{display:flex;}
.dash-hdr{display:flex;align-items:center;gap:12px;padding:14px 20px 14px;border-bottom:1.5px solid var(--rule);background:var(--paper);flex-shrink:0;}
.dash-back{background:none;border:none;cursor:pointer;font-size:22px;color:var(--ink);padding:0;line-height:1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.dash-title{flex:1;font-family:var(--serif);font-weight:800;font-size:18px;color:var(--ink);}
.dash-refresh{font-family:var(--sans);font-size:10px;color:var(--muted);text-align:right;line-height:1.3;}
.dash-refresh .countdown{font-weight:600;color:var(--ink2);}
.dash-body{flex:1;overflow-y:auto;padding:18px 20px 32px;}
.dash-card{background:var(--paper);border:1.5px solid var(--rule);border-radius:16px;padding:16px;margin-bottom:14px;}
.dash-route{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.dash-route-text{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--ink);line-height:1.2;}
.dash-route-arrow{color:var(--accent);font-size:18px;}
.dash-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.dash-meta-blk{background:var(--warm);border-radius:10px;padding:10px 12px;}
.dash-meta-lbl{font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.dash-meta-val{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--ink);line-height:1.2;}
.dash-meta-val.late{color:#b5620f;}
.dash-meta-val.cxl{color:var(--red);}
.dash-meta-val.ontime{color:#1a6b3c;}
.dash-meta-sub{font-family:var(--sans);font-size:10px;color:var(--muted);margin-top:2px;}

/* POSITION BAR */
.dash-pos{padding:18px 16px;}
.dash-pos-lbl{font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;text-align:center;}
.dash-pos-bar{position:relative;height:6px;background:var(--rule);border-radius:3px;margin:30px 8px 8px;}
.dash-pos-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(to right, var(--accent), #c47821);border-radius:3px;transition:width 0.8s ease;}
.dash-pos-train{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:24px;transition:left 0.8s ease;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.25));z-index:2;}
.dash-pos-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:var(--paper);border:2px solid var(--rule);z-index:1;}
.dash-pos-dot.passed{background:var(--accent);border-color:var(--accent);}
.dash-pos-ends{display:flex;justify-content:space-between;margin-top:14px;font-family:var(--sans);font-size:11px;}
.dash-pos-end{max-width:42%;}
.dash-pos-end.right{text-align:right;}
.dash-pos-end-nm{font-weight:700;color:var(--ink);font-size:12px;}
.dash-pos-end-time{color:var(--muted);font-size:10px;margin-top:2px;}
.dash-pos-status{text-align:center;font-family:var(--sans);font-size:12px;color:var(--ink2);margin-top:12px;padding:8px;background:var(--warm);border-radius:8px;}
.dash-pos-status strong{color:var(--accent);}

/* CALLING POINTS TABLE */
.dash-sec-lbl{font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:18px 4px 8px;}
.dash-stops{background:var(--paper);border:1.5px solid var(--rule);border-radius:16px;overflow:hidden;}
.dash-stop{display:grid;grid-template-columns:14px 1fr auto;gap:10px;padding:11px 14px;border-bottom:1px solid var(--rule);align-items:center;}
.dash-stop:last-child{border-bottom:none;}
.dash-stop.passed{opacity:0.55;}
.dash-stop.current{background:rgba(232,160,32,0.08);}
.dash-stop-marker{width:10px;height:10px;border-radius:50%;background:var(--paper);border:2px solid var(--rule);justify-self:center;}
.dash-stop.passed .dash-stop-marker{background:var(--accent);border-color:var(--accent);}
.dash-stop.current .dash-stop-marker{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,160,32,0.25);}
.dash-stop-info{min-width:0;}
.dash-stop-name{font-family:var(--serif);font-weight:700;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dash-stop-plt{font-family:var(--sans);font-size:10px;color:var(--muted);margin-top:1px;}
.dash-stop-plt strong{color:var(--ink2);}
.dash-stop-times{text-align:right;display:flex;flex-direction:column;gap:1px;min-width:64px;}
.dash-stop-planned{font-family:var(--sans);font-size:11px;color:var(--muted);text-decoration:line-through;}
.dash-stop-planned.no-strike{text-decoration:none;color:var(--ink2);font-weight:600;font-size:13px;}
.dash-stop-actual{font-family:var(--sans);font-size:13px;font-weight:700;}
.dash-stop-actual.late{color:#b5620f;}
.dash-stop-actual.ontime{color:#1a6b3c;}
.dash-stop-actual.cxl{color:var(--red);}

.dash-loading{padding:40px 20px;text-align:center;color:var(--muted);font-family:var(--sans);font-size:13px;}
.dash-error{padding:20px;text-align:center;color:var(--muted);font-family:var(--sans);font-size:13px;background:var(--warm);border-radius:10px;margin-top:14px;}

/* BOTTOM SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,18,8,0.45);z-index:500;align-items:flex-end;backdrop-filter:blur(3px);}
.overlay.open{display:flex;}
.sheet{background:var(--paper);width:100%;max-width:430px;margin:0 auto;border-radius:24px 24px 0 0;max-height:88vh;overflow-y:auto;scrollbar-width:none;animation:shUp 0.27s cubic-bezier(0.32,0.72,0,1);}
.sheet::-webkit-scrollbar{display:none;}
@keyframes shUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sh-handle{width:40px;height:4px;background:var(--rule);border-radius:2px;margin:12px auto 0;}
.sh-header{padding:16px 22px 13px;border-bottom:1px solid var(--rule);}
.sh-title{font-family:var(--serif);font-size:21px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.sh-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;}
.sh-meta span{display:flex;align-items:center;gap:4px;}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.sdot.on-time{background:var(--green);}
.sdot.delayed{background:var(--amber);}
.sdot.cancelled{background:var(--red);}
.sh-body{padding:16px 22px 8px;}
.sh-sec-lbl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:13px;}
.stop-row{display:flex;gap:13px;}
.stop-left{display:flex;flex-direction:column;align-items:center;width:13px;flex-shrink:0;}
.stop-dot{width:11px;height:11px;border-radius:50%;background:var(--paper);border:2px solid var(--muted);flex-shrink:0;margin-top:3px;z-index:1;}
.stop-dot.term{background:var(--ink);border-color:var(--ink);width:13px;height:13px;margin-top:2px;}
.stop-dot.done{background:var(--muted);border-color:var(--muted);}
.stop-conn{flex:1;width:1.5px;background:var(--rule);min-height:28px;}
.stop-info{flex:1;padding-bottom:20px;}
.stop-nm{font-size:13px;font-weight:500;color:var(--ink);}
.stop-times{display:flex;gap:12px;margin-top:3px;flex-wrap:wrap;}
.st-blk{display:flex;flex-direction:column;gap:1px;}
.st-lbl{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.st-val{font-size:14px;font-weight:700;color:var(--ink);}
.st-val.late{color:#b5620f;}
.st-val.done{color:#1a6b3c;}
.st-val.cxl{color:var(--red);}
.st-val.ontime{color:#1a6b3c;}
.st-val.planned{color:var(--ink2);font-weight:500;}

// App version — increment: MAJOR.MINOR.PATCH
// MAJOR: breaking changes, MINOR: new features, PATCH: bug fixes
const APP_VERSION = '2.0.0';
const HUXLEY_BASE  = 'https://national-rail-api.davwheat.dev';
const HUXLEY_TOKEN = 'daa42fa5-d0c0-4f65-a398-dceb8327586d';

// Timetable data is generated nightly by GitHub Actions and saved as timetable.json
// in your repo. No API keys needed — it uses Network Rail's free open GTFS data.
// See .github/workflows/fetch-timetable.yml and scripts/fetch_timetable.py
const TIMETABLE_URL = './timetable.json';

function apiUrl(path, params = {}) {
  const p = new URLSearchParams({ accessToken: HUXLEY_TOKEN, ...params });
  return `${HUXLEY_BASE}${path}?${p}`;
}

// Read timetable from locally-generated JSON for future date searches
async function fetchTimetable(fc, tc, dateStr, timeStr) {
  let data;
  try {
    data = await xhrGet(TIMETABLE_URL);
  } catch(e) {
    throw new Error('timetable-not-found');
  }
  if (!data || !data.routes) throw new Error('timetable-not-found');

  const key = `${fc}-${tc}-${dateStr}`;
  const services = data.routes[key] || [];

  // Filter to services at/after the requested time
  const [rh, rm] = (timeStr || '00:00').split(':').map(Number);
  const fromMins = rh * 60 + rm;

  // Build reverse lookup: operator name → code from OPERATOR_BRAND
  const NAME_TO_CODE = {};
  Object.entries(OPERATOR_BRAND).forEach(([code, b]) => { if (b.name) NAME_TO_CODE[b.name] = code; });

  return services
    .filter(s => {
      if (!s.std) return true;
      const [h, m] = s.std.split(':').map(Number);
      return (h * 60 + m) >= fromMins;
    })
    .map(s => {
      const opCode = s.operatorCode || NAME_TO_CODE[s.operator] || '';
      return {
        std: s.std,
        etd: s.std,
        atd: null,
        platform: null,
        operator: s.operator || '',
        operatorCode: opCode,
        isCancelled: false,
        serviceID: s.serviceId || '',
        origin: [{ locationName: s.stops?.[0]?.name || fc, crs: fc }],
        destination: [{ locationName: s.stops?.[s.stops.length-1]?.name || tc, crs: tc }],
        subsequentCallingPoints: s.stops ? [{
          callingPoint: s.stops.slice(1).map(st => ({
            locationName: st.name,
            crs: st.crs,
            st: st.dep || st.arr || '',
            et: 'On time',
            at: null,
            platform: null,
          }))
        }] : [],
        _isTimetable: true,
      };
    });
}

// Build AC results including city "All terminals" option at top
function buildACResults(q) {
  if (!q || q.length < 1) return [];
  const ql = q.toLowerCase().trim();
  const items = [];

  // Check if query matches a city name — inject "All terminals" first
  for (const [city, data] of Object.entries(CITY_GROUPS)) {
    if (city.toLowerCase().startsWith(ql) || ql.startsWith(city.toLowerCase().slice(0,3))) {
      if (data.stations.length > 1) {
        items.push({ name: `${city} (All terminals)`, code: city, allTerminals: true, city });
      }
      // Also show individual stations for that city
      data.stations.forEach(s => items.push({ name: s.name, code: s.crs, allTerminals: false }));
    }
  }

  // Regular station search (skip if city group already matched)
  if (!items.length) {
    const stationResults = searchStations(q);
    stationResults.forEach(s => items.push({ name: s.name, code: s.code, allTerminals: false }));
  }

  return items.slice(0, 12);
}

function setupAC(inId, acId) {
  const inp = document.getElementById(inId), ac = document.getElementById(acId);
  let hi = -1;

  function renderAC(q) {
    const results = buildACResults(q);
    if (!results.length) { ac.classList.remove('open'); return; }
    ac.innerHTML = results.map((r, idx) =>
      `<div class="ac-it${r.allTerminals ? ' all-term' : ''}" data-name="${r.name}" data-idx="${idx}">
        <span class="ac-crs">${r.allTerminals ? '⊕' : r.code}</span>
        <span class="ac-nm">${hl(r.name, q)}</span>
      </div>`
    ).join('');
    ac.classList.add('open');
  }

  inp.addEventListener('input', () => {
    const q = inp.value.trim(); hi = -1;
    if (!q) { ac.classList.remove('open'); return; }
    renderAC(q);
  });
  ac.addEventListener('mousedown', e => {
    const it = e.target.closest('.ac-it'); if (!it) return;
    e.preventDefault(); inp.value = it.dataset.name; ac.classList.remove('open'); inp.blur();
    updateClearBtns();
  });
  inp.addEventListener('keydown', e => {
    const its = ac.querySelectorAll('.ac-it'); if (!its.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); hi = Math.min(hi+1, its.length-1); its.forEach((el,i) => el.classList.toggle('hi', i===hi)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); hi = Math.max(hi-1, -1); its.forEach((el,i) => el.classList.toggle('hi', i===hi)); }
    else if (e.key === 'Enter' && hi >= 0) { e.preventDefault(); inp.value = its[hi].dataset.name; ac.classList.remove('open'); }
    else if (e.key === 'Escape') ac.classList.remove('open');
  });
  inp.addEventListener('focus', () => {
    if (inp.value.trim()) renderAC(inp.value.trim());
  });
  inp.addEventListener('blur', () => setTimeout(() => ac.classList.remove('open'), 200));
}

const CODE_MAP = {};
STATIONS.forEach(s => { CODE_MAP[s.name.toLowerCase()] = s.code; });
function getCode(n) {
  // Handle "City (All terminals)" — return first station's CRS as primary
  const allMatch = n.match(/^(.+?) \(All terminals\)$/);
  if (allMatch) {
    const grp = CITY_GROUPS[allMatch[1]];
    return grp ? grp.stations[0].crs : n.toUpperCase().slice(0,3);
  }
  return CODE_MAP[n.toLowerCase().trim()] || n.trim().toUpperCase().slice(0,3);
}

// Return all CRS codes for a station name (multiple if city group selected)
function getAllCodes(n) {
  const allMatch = n.match(/^(.+?) \(All terminals\)$/);
  if (allMatch) {
    const grp = CITY_GROUPS[allMatch[1]];
    if (grp) return grp.stations.map(s => s.crs);
  }
  return [getCode(n)];
}

// ── IMPROVED SEARCH: substring anywhere in full name, not just word-prefix ──
function searchStations(q) {
  if (!q || q.length < 1) return [];
  const ql = q.toLowerCase().trim();
  const results = STATIONS.filter(s =>
    s.name.toLowerCase().includes(ql) || s.code.toLowerCase() === ql
  );
  // Score: full-name starts with query = 0, any word starts with = 1, contains = 2, code = 3
  results.sort((a, b) => {
    const al = a.name.toLowerCase(), bl = b.name.toLowerCase();
    const sc = n => n.startsWith(ql) ? 0 : n.split(/[\s&'()\-]+/).some(w => w.startsWith(ql)) ? 1 : 2;
    return sc(al) - sc(bl) || al.localeCompare(bl);
  });
  return results.slice(0, 9);
}

function hl(str, q) {
  const i = str.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return str;
  return str.slice(0,i) + '<mark>' + str.slice(i, i+q.length) + '</mark>' + str.slice(i+q.length);
}

  sv('sc2', searchCounts);

  // Update recent routes — prepend, remove duplicates, cap at 10
  recentRoutes = recentRoutes.filter(r => !(r.fc === fc && r.tc === tc));
  recentRoutes.unshift({from, to, fc, tc});
  recentRoutes = recentRoutes.slice(0, 10);
  sv('recentRoutes', recentRoutes);

  renderPopular();
  renderRecent();
}

function renderPopular() {
  const list = document.getElementById('popularList');
  const pk = PINNED.map(p => `${p.fc}__${p.tc}`);
  const dyn = Object.entries(searchCounts)
    .filter(([k]) => !k.endsWith('_n') && !pk.includes(k))
    .sort((a,b) => b[1]-a[1])
    .map(([k]) => {
      const nm = searchCounts[k+'_n']||'';
      const [from='',to=''] = nm.split('|||');
      const [fc,tc] = k.split('__');
      return {from, to, fc, tc};
    }).filter(r => r.from && r.to);

  // Max 4 total: pinned first, then fill with dynamic
  const all = [...PINNED, ...dyn].slice(0, 4);
  list.innerHTML = all.map(r =>
    `<div class="pop-chip" data-from="${r.from}" data-to="${r.to}">
      <div class="pop-r">${r.fc}<span class="pop-a">→</span>${r.tc}</div>
      <div class="pop-l">${r.from.split(' ')[0]}→${r.to.split(' ')[0]}</div>
    </div>`).join('');
}

let curFrom='', curTo='', curFc='', curTc='';
let curFromCodes=[], curToCodes=[];
let curBaseOffset = 0; // minutes from now to the "anchor" time for this search
let loadedSvcs = [];

function doSearch() {
  const from = document.getElementById('fromInput').value.trim();
  const to   = document.getElementById('toInput').value.trim();
  if (!from || !to) {
    const el = document.getElementById(!from ? 'fromInput' : 'toInput');
    el.style.color='var(--red)'; setTimeout(()=>el.style.color='',600); return;
  }
  document.getElementById('fromAC').classList.remove('open');
  document.getElementById('toAC').classList.remove('open');
  curFrom = from; curTo = to;
  curFc = getCode(from); curTc = getCode(to);
  // Store all origin/destination CRS codes for multi-terminal searches
  curFromCodes = getAllCodes(from);
  curToCodes   = getAllCodes(to);
  loadedSvcs = [];

  // Compute base offset from now (minutes)
  const now = new Date();
  if (timeMode === 'now') {
    curBaseOffset = -5;
  } else if (timeMode === 'time') {
    const tv = document.getElementById('timeInput').value;
    if (tv) {
      const [h,m] = tv.split(':').map(Number);
      const t = new Date(); t.setHours(h,m,0,0);
      if (t < now) t.setDate(t.getDate() + 1);
      curBaseOffset = Math.round((t - now) / 60000);
    }
  } else if (timeMode === 'date') {
    // Date mode — use TransportAPI timetable (supports any future date)
    const dv = document.getElementById('dateInput').value;
    const tv = document.getElementById('timeInput').value || '06:00';
    if (!dv) { alert('Please pick a date.'); return; }

    const list = document.getElementById('resultsList');
    const loading = document.getElementById('loadingState');
    document.getElementById('emptyState').style.display = 'none';
    list.innerHTML = ''; loading.classList.add('show');
    document.getElementById('loadingLbl').textContent = 'Fetching timetable…';

    fetchTimetable(curFc, curTc, dv, tv)
      .then(svcs => {
        loading.classList.remove('show');
        if (!svcs.length) {
          list.innerHTML = `<div class="err-box"><strong>No services found</strong>No trains from ${curFrom} to ${curTo} on ${dv} around ${tv}.</div>`;
          return;
        }
        const hdr = document.createElement('div'); hdr.className = 'res-hdr';
        hdr.innerHTML = `<div class="res-rt">${curFrom.split(' ')[0]} → ${curTo.split(' ')[0]}</div>
          <div class="res-ct">Timetable · ${dv} from ${tv}</div>`;
        list.appendChild(hdr);
        svcs.slice(0, 10).forEach((s, i) => {
          const c = makeCard(s); c.style.animationDelay = `${i * 0.04}s`;
          list.appendChild(c);
        });
      })
      .catch(err => {
        loading.classList.remove('show');
        if (err.message === 'timetable-not-found' || err.message === 'no-tapi-keys') {
          list.innerHTML = `<div class="err-box">
            <strong>Timetable not yet generated</strong>
            The timetable file is built nightly by GitHub Actions. If you've just set up the repo, trigger it manually: go to your repo → <strong>Actions</strong> → <strong>Fetch Timetable Data</strong> → <strong>Run workflow</strong>.
          </div>`;
        } else {
          list.innerHTML = `<div class="err-box"><strong>Could not load timetable</strong>${err.message}</div>`;
        }
      });
    return;
  }

  // Darwin API limit — cap at ~2hrs ahead
  if (curBaseOffset > 119) {
    curBaseOffset = 119;
    const list = document.getElementById('resultsList');
    document.getElementById('emptyState').style.display = 'none';
    list.innerHTML = `<div class="err-box" style="background:rgba(181,98,15,0.08);border-color:rgba(181,98,15,0.25);">
      <strong style="color:#b5620f;">Showing next available trains</strong>
      <span style="color:var(--ink2);font-size:12px;display:block;margin-top:4px;">The live API only covers ~2 hours ahead. Use <strong>Pick date</strong> for future journeys, or <strong>↓ Later trains</strong> to scroll forward.</span>
    </div>`;
  }

  recordSearch(from, to, curFc, curTc);
  fetchTrains(curBaseOffset, 'replace');
}

// ════════════════════════════════════════
// FETCH HELPER — plain XMLHttpRequest, works when hosted on GitHub Pages
// ════════════════════════════════════════
function xhrGet(url, timeoutMs = 15000) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = timeoutMs;
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { reject(new Error('Invalid JSON response from API')); }
      } else {
        reject(new Error(`API error ${xhr.status}: ${xhr.responseText.slice(0, 300)}`));
      }
    };
    xhr.onerror   = () => reject(new Error('Network error — could not reach the API.'));
    xhr.ontimeout = () => reject(new Error('Request timed out after 15s'));
    xhr.send();
  });
}

// ════════════════════════════════════════
// FETCH
// ════════════════════════════════════════

// Convert HH:MM string to minutes since midnight
function toMins(std) {
  if (!std) return -1;
  const [h,m] = std.split(':').map(Number);
  return h * 60 + m;
}

// Minutes since midnight "now"
function nowMins() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

// Convert minutes-since-midnight to a timeOffset (minutes from now), handling midnight rollover
function minsToOffset(targetMins) {
  let diff = targetMins - nowMins();
  // If negative, the target is the next day
  if (diff < -60) diff += 1440;
  return diff;
}

let lastShownStd = null;

const PAGE_SIZE = 5;   // trains loaded per press
const MAX_SHOWN = 10;  // max trains visible at once

async function fetchTrains(offset, mode) {
  const empty   = document.getElementById('emptyState');
  const loading = document.getElementById('loadingState');
  const lbl     = document.getElementById('loadingLbl');
  const list    = document.getElementById('resultsList');

  empty.style.display = 'none';

  const BATCH = PAGE_SIZE; // how many trains to fetch per request

  if (mode === 'replace') {
    loading.classList.add('show'); list.innerHTML = ''; loadedSvcs = []; lastShownStd = null;
    lbl.textContent = 'Fetching live trains…';
  } else {
    lbl.textContent = mode === 'later' ? 'Loading later trains…' : 'Loading earlier trains…';
    loading.classList.add('show');
    const btn = document.getElementById(mode === 'later' ? 'btnLater' : 'btnEarlier');
    if (btn) { btn.classList.add('busy'); btn.textContent = 'Loading…'; }
  }


  // Fetch with destination filter. If multiple origin stations (city group),
  // searches all of them in parallel and merges results.
  async function fetchWindow(off) {
    const clamped = Math.max(-120, Math.min(119, off));
    const origins = curFromCodes.length > 0 ? curFromCodes : [curFc];
    const dests   = curToCodes.length > 0 ? curToCodes : [curTc];

    // Search every combination of origin → each destination
    const promises = [];
    for (const fc of origins) {
      for (const tc of dests) {
        if (fc === tc) continue;
        const url = apiUrl(`/departures/${fc}/to/${tc}/30`, {
          expand: 'true',
          timeOffset: clamped,
          timeWindow: 120
        });
        promises.push(xhrGet(url).then(r => r.trainServices || []).catch(() => []));
      }
    }
    const results = await Promise.all(promises);
    return results.flat();
  }

  async function fetchEnough(startOffset) {
    const allResults = [];
    const seen = new Set();

    function addResults(results) {
      let added = 0;
      for (const s of results) {
        const key = s.serviceID || (s.std + '_' + (s.operator||''));
        if (!seen.has(key)) { seen.add(key); allResults.push(s); added++; }
      }
      return added;
    }

    // Fetch first two windows in parallel for speed
    const [w0, w1] = await Promise.all([
      fetchWindow(startOffset).catch(() => []),
      fetchWindow(startOffset + 120).catch(() => []),
    ]);
    addResults(w0);
    addResults(w1);

    // Fetch more windows sequentially if still needed
    for (let w = 2; w < 6 && allResults.length < BATCH; w++) {
      const off = startOffset + w * 120;
      let results = [];
      try { results = await fetchWindow(off); } catch(e) { break; }
      const added = addResults(results);
      if (added === 0) break;
    }

    // If still nothing — no trains in the live window — fall back to timetable.json
    // for tomorrow's services. The Darwin API cannot fetch beyond ~2hrs ahead.
    if (allResults.length === 0) {
      try {
        const now = new Date();
        const tomorrow = new Date(now);
        tomorrow.setDate(now.getDate() + 1);
        const dateStr = tomorrow.toISOString().slice(0, 10);
        const origins = curFromCodes.length > 0 ? curFromCodes : [curFc];
        const dests   = curToCodes.length > 0 ? curToCodes : [curTc];

        for (const fc of origins) {
          for (const tc of dests) {
            const tt = await fetchTimetable(fc, tc, dateStr, '00:00').catch(() => []);
            for (const s of tt) {
              const key = s.serviceID || (s.std + '_' + (s.operator||''));
              if (!seen.has(key)) { seen.add(key); allResults.push(s); }
            }
          }
        }
        // Also try day after tomorrow if still not enough
        if (allResults.length < BATCH) {
          const dayAfter = new Date(now);
          dayAfter.setDate(now.getDate() + 2);
          const dateStr2 = dayAfter.toISOString().slice(0, 10);
          for (const fc of origins) {
            for (const tc of dests) {
              const tt = await fetchTimetable(fc, tc, dateStr2, '00:00').catch(() => []);
              for (const s of tt) {
                const key = s.serviceID || (s.std + '_' + (s.operator||''));
                if (!seen.has(key)) { seen.add(key); allResults.push(s); }
              }
            }
          }
        }
      } catch(e) {
        // timetable.json not available — nothing we can do
      }
    }

    return allResults;
  }

  try {
    const raw = await fetchEnough(offset);
    loading.classList.remove('show');

    // Sort chronologically
    const base = ((nowMins() + offset) % 1440 + 1440) % 1440;
    raw.sort((a, b) => {
      const da = (toMins(a.std) - base + 1440) % 1440;
      const db = (toMins(b.std) - base + 1440) % 1440;
      return da - db;
    });

    let svcs;
    if (mode === 'later' && lastShownStd !== null) {
      const lastM = toMins(lastShownStd);
      svcs = raw.filter(s => {
        const diff = (toMins(s.std) - lastM + 1440) % 1440;
        return diff > 0 && diff < 720;
      }).slice(0, BATCH);
    } else if (mode === 'earlier') {
      const boundary = loadedSvcs[0]?.std;
      if (boundary) {
        const boundaryM = toMins(boundary);
        svcs = raw.filter(s => {
          const diff = (boundaryM - toMins(s.std) + 1440) % 1440;
          return diff > 0 && diff < 720;
        }).slice(-BATCH);
      } else {
        svcs = raw.slice(0, BATCH);
      }
    } else {
      svcs = raw.slice(0, BATCH);
    }

    // ── TIMETABLE TOP-UP ─────────────────────────────────────────────
    // If we have fewer than BATCH live trains, pad with timetable entries.
    // This seamlessly bridges the 2-hour live window with scheduled times.
    if (mode !== 'earlier' && svcs.length < BATCH) {
      try {
        const today = new Date();
        const dateStr = today.toISOString().slice(0, 10);
        // Start timetable from 1 min after the last live train, or from now
        const afterStd = svcs.length > 0 ? svcs[svcs.length - 1].std : null;
        const afterMins = afterStd ? toMins(afterStd) + 1 : nowMins();
        const afterTime = `${String(Math.floor(afterMins / 60) % 24).padStart(2,'0')}:${String(afterMins % 60).padStart(2,'0')}`;

        // Also check tomorrow if we're near midnight
        const dates = [dateStr];
        if (afterMins >= 1380) { // after 11pm, also pull tomorrow
          const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
          dates.push(tomorrow.toISOString().slice(0, 10));
        }

        const liveIds = new Set(svcs.map(s => s.serviceID).filter(Boolean));
        let timetableServices = [];

        for (const d of dates) {
          const tt = await fetchTimetable(curFc, curTc, d, afterTime).catch(() => []);
          for (const s of tt) {
            if (!liveIds.has(s.serviceID)) timetableServices.push(s);
          }
        }

        // Sort timetable entries after the last live train
        timetableServices.sort((a, b) => {
          const da = (toMins(a.std) - base + 1440) % 1440;
          const db = (toMins(b.std) - base + 1440) % 1440;
          return da - db;
        });

        // Fill up to BATCH
        const needed = BATCH - svcs.length;
        svcs = [...svcs, ...timetableServices.slice(0, needed)];
      } catch(e) {
        // Timetable not available yet — that's fine, show what we have
      }
    }

    if (mode === 'replace' && !svcs.length) {
      list.innerHTML = `<div class="err-box"><strong>No trains found</strong>No services from <em>${curFrom}</em> to <em>${curTo}</em> around this time.</div>`;
      return;
    }

    if (mode === 'replace') {
      const hdr = document.createElement('div'); hdr.className='res-hdr';
      hdr.innerHTML = `<div class="res-rt">${curFrom.split(' ')[0]} → ${curTo.split(' ')[0]}</div><div class="res-ct" id="resCt">${svcs.length} trains</div>`;
      list.appendChild(hdr);
    }

    // Helper: insert a date divider
    function makeDivider(label) {
      const d = document.createElement('div');
      d.className = 'date-divider';
      d.innerHTML = `<div class="date-divider-inner">${label}</div>`;
      return d;
    }

    // Tag each service with its calendar date based on midnight rollover.
    // startDate should always be today or a known date at midnight.
    function tagDates(services) {
      const now = new Date();
      const nowM = now.getHours() * 60 + now.getMinutes();

      // Use local date strings to avoid UTC timezone shift
      function localDateStr(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      }

      const today = new Date(now); today.setHours(0,0,0,0);
      const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
      const todayStr    = localDateStr(today);
      const tomorrowStr = localDateStr(tomorrow);

      return services.map(s => {
        if (s._isTimetable && s._date) return s;
        const sm = toMins(s.std);
        if (sm < 0) return { ...s, _date: todayStr };
        const dateStr = sm >= nowM ? todayStr : tomorrowStr;
        return { ...s, _date: dateStr };
      });
    }

    function formatDividerLabel(dateStr) {
      const parts = dateStr.split('-').map(Number);
      const d = new Date(parts[0], parts[1]-1, parts[2]); // local date, no UTC shift
      const today = new Date(); today.setHours(0,0,0,0);
      const diff = Math.round((d - today) / 86400000);
      const dayStr = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
      if (diff === 0) return `Today — ${dayStr}`;
      if (diff === 1) return `Tomorrow — ${dayStr}`;
      return dayStr;
    }

    function formatDividerLabel(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const today = new Date(); today.setHours(0,0,0,0);
      const diff = Math.round((d - today) / 86400000);
      const dayStr = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
      if (diff === 0) return `Today — ${dayStr}`;
      if (diff === 1) return `Tomorrow — ${dayStr}`;
      return dayStr;
    }

    if (mode === 'replace') {
      list.innerHTML = '';
      loadedSvcs = [];
      lastShownStd = null;
      const tagged = tagDates(svcs);
      let lastDate = null;
      tagged.forEach(s => {
        if (s._date !== lastDate) {
          if (lastDate !== null) list.appendChild(makeDivider(formatDividerLabel(s._date)));
          lastDate = s._date;
        }
        loadedSvcs.push(s);
        list.appendChild(makeCard(s));
      });

    } else if (mode === 'later') {
      const tagged = tagDates(svcs);
      tagged.forEach(s => {
        const prevDate = loadedSvcs.length > 0 ? loadedSvcs[loadedSvcs.length-1]._date : null;
        if (prevDate && s._date !== prevDate) {
          list.appendChild(makeDivider(formatDividerLabel(s._date)));
        }
        loadedSvcs.push(s);
        list.appendChild(makeCard(s));
      });
      // Remove oldest from top if over MAX_SHOWN
      while (loadedSvcs.length > MAX_SHOWN) {
        loadedSvcs.shift();
        const first = list.querySelector('.train-card');
        if (first) {
          const prev = first.previousElementSibling;
          if (prev && prev.classList.contains('date-divider')) prev.remove();
          first.remove();
        }
      }

    } else if (mode === 'earlier') {
      const tagged = tagDates(svcs).reverse();
      tagged.forEach(s => {
        const nextDate = loadedSvcs.length > 0 ? loadedSvcs[0]._date : null;
        loadedSvcs.unshift(s);
        const c = makeCard(s);
        list.prepend(c);
        if (nextDate && s._date !== nextDate) {
          c.after(makeDivider(formatDividerLabel(nextDate)));
        }
      });
      // Remove newest from bottom if over MAX_SHOWN
      while (loadedSvcs.length > MAX_SHOWN) {
        loadedSvcs.pop();
        const cards = list.querySelectorAll('.train-card');
        const last = cards[cards.length-1];
        if (last) {
          const next = last.nextElementSibling;
          if (next && next.classList.contains('date-divider')) next.remove();
          last.remove();
        }
      }
    }

    // Update tracking
    const allCards = list.querySelectorAll('.train-card');
    if (allCards.length > 0) lastShownStd = allCards[allCards.length-1].dataset.std || null;
    const firstCardStd = allCards.length > 0 ? allCards[0].dataset.std : null;

    // ── BUTTONS ──
    const btnE = document.getElementById('btnEarlier');
    const btnL = document.getElementById('btnLater');

    if (firstCardStd) {
      btnE.classList.add('show');
      btnE.classList.remove('busy');
      btnE.onclick = () => {
        btnE.classList.add('busy');
        const startMins = (toMins(firstCardStd) - 240 + 1440) % 1440;
        fetchTrains(minsToOffset(startMins), 'earlier');
      };
    } else {
      btnE.classList.remove('show');
    }

    if (lastShownStd) {
      btnL.classList.add('show');
      btnL.classList.remove('busy');
      btnL.onclick = () => {
        btnL.classList.add('busy');
        const startMins = (toMins(lastShownStd) + 1 + 1440) % 1440;
        fetchTrains(minsToOffset(startMins), 'later');
      };
    } else {
      btnL.classList.remove('show');
    }

  } catch(err) {
    loading.classList.remove('show');
    list.innerHTML = `<div class="err-box"><strong>Could not load trains</strong>${err.message}</div>`;
  }
}

function operatorBadge(operatorCode, operatorName) {
  const brand = OPERATOR_BRAND[operatorCode];
  const bg    = brand ? brand.bg : '#6b7a99';
  const fg    = brand ? brand.fg : '#fff';
  const name  = brand ? brand.name : (operatorName || operatorCode || '?');
  // Abbreviate to keep pill compact
  const short = name.length <= 3 ? name
    : name === 'TransPennine Express' ? 'TPE'
    : name === 'Northern Trains' || name === 'Northern' ? 'NT'
    : name === 'Great Western Railway' ? 'GWR'
    : name === 'CrossCountry' ? 'XC'
    : name === 'East Midlands Railway' ? 'EMR'
    : name === 'Greater Anglia' ? 'GA'
    : name === 'West Midlands Trains' ? 'WMT'
    : name === 'South Western Railway' ? 'SWR'
    : name === 'Transport for Wales' ? 'TfW'
    : name === 'Caledonian Sleeper' ? 'CS'

    : name === 'Elizabeth line' ? 'TfL'
    : name === 'Heathrow Express' ? 'HEx'
    : name === 'London Overground' ? 'LO'
    : name === 'Southeastern' ? 'SE'
    : name.split(' ').map(w => w[0]).join('').slice(0,4);
  return `<span style="display:inline-flex;align-items:center;justify-content:center;background:${bg};color:${fg};font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;font-family:var(--sans);white-space:nowrap;letter-spacing:0.3px;min-width:24px;">${short}</span>`;
}
function makeCard(svc) {
  const dep = svc.std || '--:--';
  const etd = svc.etd || '';
  const isCx   = svc.isCancelled || etd === 'Cancelled';
  const isLate = !isCx && etd && etd !== 'On time' && etd !== dep;
  const cls  = isCx ? 'cancelled' : isLate ? 'delayed' : 'on-time';
  const lbl  = isCx ? 'Cancelled' : isLate ? etd : 'On time';
  const arr  = getArrival(svc);
  const dur  = getDuration(svc);
  const plt  = svc.platform;
  const op   = svc.operator || '';

  // Format date label if the service has a _date tag
  let dateLabel = '';
  if (svc._date) {
    const parts = svc._date.split('-').map(Number);
    const d = new Date(parts[0], parts[1]-1, parts[2]); // local, no UTC shift
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    const dayName = diff === 0 ? 'Today' : diff === 1 ? 'Tomorrow'
      : d.toLocaleDateString('en-GB', {weekday:'long'});
    const dateStr = d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
    dateLabel = `<div class="card-date">${dayName} · ${dateStr}</div>`;
  }

  // Check if this specific train is already a favourite
  const sid  = svc.serviceID || svc.serviceIdGuid || svc.serviceIdUrlSafe || '';
  const isFav = favourites.some(f => f.serviceId === sid && sid);

  const c = document.createElement('div');
  c.className = `train-card ${cls}`;
  c.dataset.std = dep;
  c.innerHTML = `
    <div class="card-body">
      <div class="tc">
        ${dateLabel}
        <div class="dep">${dep}</div>
        <div class="arr">arr ${arr}</div>
      </div>
      <div class="mc">
        <div class="dur-lbl">${dur}</div>
        <div class="rail-line"></div>
        <div class="stops-tag direct">Direct</div>
      </div>
      <div class="rc">
        <div class="sc ${cls}">${lbl}</div>
        <div class="plt-tag">${plt ? `Plt <strong>${plt}</strong>` : `<span style="color:var(--muted);font-size:10px;">Plt TBC</span>`}</div>
      </div>
    </div>
    <div class="card-foot">
      ${operatorBadge(svc.operatorCode, op)}
      <span class="opr">${op}</span>
      ${svc._isTimetable ? `<span style="font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(107,122,153,0.12);color:var(--muted);font-family:var(--sans);">Timetable</span>` : ''}
      <span class="fav-btn ${isFav?'starred':''}" title="${isFav?'Remove from favourites':'Star this train'}">${isFav?'★':'☆'}</span>
    </div>`;

  c.querySelector('.fav-btn').addEventListener('click', e => {
    e.stopPropagation(); toggleFav(svc, e.currentTarget);
  });
  c.addEventListener('click', () => openDetail(svc));
  return c;
}

// Normalise calling points from either Darwin (nested) or Huxley (flat) format
function getCallingPoints(svc) {
  const raw = svc.subsequentCallingPoints;
  if (!raw) return [];
  // Darwin: { callingPointList: { callingPoint: [] } } or array of lists
  // Huxley: array of { callingPoint: [] }
  const lists = Array.isArray(raw) ? raw : [raw];
  return lists.flatMap(g => {
    const cp = g.callingPoint || g.callingPointList?.callingPoint || [];
    return Array.isArray(cp) ? cp : [cp];
  });
}

function getArrival(svc) {
  const all = getCallingPoints(svc);
  const d = all.find(cp => cp.crs && cp.crs.toUpperCase() === curTc.toUpperCase());
  if (d) return d.st || '--:--';
  if (all.length) return all[all.length-1].st || '--:--';
  return '--:--';
}

function getDuration(svc) {
  if (!svc.std) return '';
  const all = getCallingPoints(svc);
  const dest = all.find(cp => cp.crs && cp.crs.toUpperCase() === curTc.toUpperCase()) || all[all.length-1];
  if (!dest?.st) return '';
  const [dh,dm] = svc.std.split(':').map(Number);
  const [ah,am] = dest.st.split(':').map(Number);
  let mins = (ah*60+am) - (dh*60+dm); if (mins < 0) mins += 1440;
  if (!mins) return '';
  return `${Math.floor(mins/60)}h ${mins%60}m`;
}

function toggleFav(svc, btn) {
  const sid = svc.serviceID || svc.serviceIdGuid || svc.serviceIdUrlSafe || '';
  const dep = svc.std || '--:--';
  const label = `${dep} ${curFc}→${curTc}`;

  const ex = sid ? favourites.findIndex(f => f.serviceId === sid) : -1;
  if (ex >= 0) {
    favourites.splice(ex, 1);
    btn.classList.remove('starred'); btn.textContent = '☆';
  } else {
    if (favourites.length >= 5) { alert('Maximum 5 favourites. Remove one first.'); return; }
    favourites.push({
      label,
      from: curFrom, to: curTo, fc: curFc, tc: curTc,
      dep, operator: svc.operator || '',
      serviceId: sid,
      // Store full service so we can open detail directly without re-fetching board
      svcSnapshot: JSON.parse(JSON.stringify(svc)),
      snapshotFc: curFc, snapshotTc: curTc,
      snapshotFrom: curFrom, snapshotTo: curTo,
    });
    btn.classList.add('starred'); btn.textContent = '★';
  }
  sv('favs2', favourites);
  renderFavStrip();
  renderFavPanel();
}

async function openDetail(svc) {
  const dep = svc.std||'--:--', etd = svc.etd||'';
  const isCx = svc.isCancelled||(etd==='Cancelled');
  const isLate = !isCx && etd && etd!=='On time' && etd!==dep;
  const cls = isCx?'cancelled':isLate?'delayed':'on-time';
  const lbl = isCx?'Cancelled':isLate?`Delayed (${etd})`:etd||'On time';

  document.getElementById('shTitle').textContent = `${dep} departure`;
  document.getElementById('shMeta').innerHTML =
    `<span><span class="sdot ${cls}"></span>${lbl}</span>
     <span>${operatorBadge(svc.operatorCode, svc.operator||'')} ${svc.operator||''}</span>
     ${svc.platform?`<span>Platform <strong>${svc.platform}</strong></span>`:`<span style="color:var(--muted)">Platform TBC</span>`}`;
  // Wire the sheet star button
  const shFavBtn = document.getElementById('shFavBtn');
  const sid = svc.serviceID || svc.serviceIdGuid || svc.serviceIdUrlSafe || '';
  const alreadyFaved = sid && favourites.some(f => f.serviceId === sid);
  shFavBtn.textContent = alreadyFaved ? '★' : '☆';
  shFavBtn.style.color = alreadyFaved ? '#e8a020' : 'var(--rule)';
  shFavBtn.onclick = () => {
    // Reuse toggleFav by passing a dummy button element
    const dummyBtn = { classList: { add: ()=>{}, remove: ()=>{} }, textContent: '' };
    toggleFav(svc, dummyBtn);
    const nowFaved = sid && favourites.some(f => f.serviceId === sid);
    shFavBtn.textContent = nowFaved ? '★' : '☆';
    shFavBtn.style.color = nowFaved ? '#e8a020' : 'var(--rule)';
    // Also update any card star button on screen
    document.querySelectorAll('.fav-btn').forEach(b => {
      b.textContent = nowFaved ? '★' : '☆';
      b.classList.toggle('starred', nowFaved);
    });
  };

  document.getElementById('stopsList').innerHTML =
    '<div style="padding:16px 0;text-align:center;font-size:12px;color:var(--muted)">Loading calling points…</div>';
  document.getElementById('sheetOverlay').classList.add('open');

  try {
    const detailId = svc.serviceIdUrlSafe || svc.serviceID;
    let pts = [];
    if (detailId) {
      try {
        const d = await xhrGet(apiUrl(`/service/${encodeURIComponent(detailId)}`));
        pts = buildPtsFromService(d, svc);
      } catch(e) { /* fall through to board data */ }
    }
    if (!pts.length) pts = buildPtsFromBoard(svc);
    renderStops(pts);
  } catch(e) { renderStops(buildPtsFromBoard(svc)); }
}

function buildPtsFromService(detail, svc) {
  const pts = [];
  const prev = (detail.previousCallingPoints||[]).flatMap(g => {
    const cp = g.callingPoint || [];
    return Array.isArray(cp) ? cp : [cp];
  });
  const next = (detail.subsequentCallingPoints||[]).flatMap(g => {
    const cp = g.callingPoint || [];
    return Array.isArray(cp) ? cp : [cp];
  });
  const now = new Date();
  prev.forEach(cp => pts.push({name:cp.locationName||cp.crs,crs:cp.crs,planned:cp.st,est:cp.et,actual:cp.at,plt:cp.platform,passed:true}));
  const [dh=0,dm=0] = (svc.std||'00:00').split(':').map(Number);
  const dt = new Date(); dt.setHours(dh,dm,0,0);
  pts.push({name:detail.locationName||curFrom,crs:detail.crs,planned:svc.std,est:svc.etd,actual:svc.atd,plt:svc.platform||detail.platform,isOri:true,passed:now>dt});
  next.forEach(cp => pts.push({name:cp.locationName||cp.crs,crs:cp.crs,planned:cp.st,est:cp.et,actual:cp.at,plt:cp.platform,passed:!!(cp.at&&cp.at!=='No report'&&cp.at!=='On time')}));
  return pts;
}

function buildPtsFromBoard(svc) {
  const pts = [{name:curFrom,crs:curFc,planned:svc.std,est:svc.etd,actual:svc.atd,plt:svc.platform,isOri:true}];
  getCallingPoints(svc).forEach(cp =>
    pts.push({name:cp.locationName||cp.crs,crs:cp.crs,planned:cp.st,est:cp.et,actual:cp.at,plt:cp.platform,passed:!!(cp.at&&cp.at!=='No report'&&cp.at!=='On time')}));
  return pts;
}

function renderStops(pts) {
  const c = document.getElementById('stopsList'); c.innerHTML = '';
  if (!pts.length) { c.innerHTML='<div style="color:var(--muted);font-size:13px;">No stop data available.</div>'; return; }
  pts.forEach((pt, i) => {
    const isLast = i === pts.length-1;
    const isCxl  = pt.est === 'Cancelled';
    const hasActual = pt.actual && pt.actual!=='No report' && pt.actual!=='On time';
    const hasEst    = !hasActual && !isCxl && pt.est && pt.est!=='No report' && pt.est!=='On time' && pt.est!==pt.planned;
    // Platform: show confirmed value, or "TBC" for origin/dest, nothing for intermediate stops without it
    const showPlt = pt.plt
      ? `<div class="stop-plt">Platform <strong>${pt.plt}</strong></div>`
      : (i===0||isLast) ? `<div class="stop-plt" style="color:var(--muted)">Platform TBC</div>` : '';
    const row = document.createElement('div'); row.className='stop-row';
    const dotCls = (i===0||isLast)?'term':pt.passed?'done':'';
    row.innerHTML = `
      <div class="stop-left">
        <div class="stop-dot ${dotCls}"></div>
        ${!isLast?'<div class="stop-conn"></div>':''}
      </div>
      <div class="stop-info">
        <div class="stop-nm">${pt.name||'—'}</div>
        <div class="stop-times">
          ${pt.planned ? `<div class="st-blk"><div class="st-lbl">Planned</div><div class="st-val planned">${pt.planned}</div></div>` : ''}
          ${isCxl
            ? `<div class="st-blk"><div class="st-lbl">Status</div><div class="st-val cxl">Cancelled</div></div>`
            : hasActual
              ? `<div class="st-blk"><div class="st-lbl">Actual</div><div class="st-val done">${pt.actual}</div></div>`
              : hasEst
                ? `<div class="st-blk"><div class="st-lbl">Estimated</div><div class="st-val late">${pt.est}</div></div>`
                : pt.planned
                  ? `<div class="st-blk"><div class="st-lbl">Live</div><div class="st-val ontime">On time</div></div>`
                  : ''}
        </div>
        ${showPlt}
      </div>`;
    c.appendChild(row);
  });
}

// ════════════════════════════════════════
// v2.0 TRAIN DASHBOARD — full-screen view for favourited trains
// ════════════════════════════════════════
let dashRefreshInterval = null;
let dashCurrentFav = null;

function closeDashboard() {
  document.getElementById('dashOverlay').classList.remove('open');
  if (dashRefreshInterval) { clearInterval(dashRefreshInterval); dashRefreshInterval = null; }
  dashCurrentFav = null;
}

function openDashboard(fav) {
  dashCurrentFav = fav;
  document.getElementById('dashOverlay').classList.add('open');
  document.getElementById('dashTitle').textContent = `${fav.from.split(' ')[0]} → ${fav.to.split(' ')[0]}`;
  document.getElementById('dashBody').innerHTML = '<div class="dash-loading">Loading train info…</div>';

  // Restore route context so service detail fetch works correctly
  if (fav.snapshotFc) {
    curFrom = fav.snapshotFrom; curTo = fav.snapshotTo;
    curFc = fav.snapshotFc;     curTc = fav.snapshotTc;
  }

  refreshDashboard(fav);

  // Countdown ticker — refresh every 60 seconds
  let secs = 60;
  const tick = () => {
    secs--;
    if (secs <= 0) { secs = 60; refreshDashboard(dashCurrentFav); }
    const el = document.getElementById('dashCountdown');
    if (el) el.textContent = `Refresh in ${secs}s`;
  };
  document.getElementById('dashCountdown').textContent = `Refresh in ${secs}s`;
  dashRefreshInterval = setInterval(tick, 1000);
}

async function refreshDashboard(fav) {
  if (!fav) return;
  document.getElementById('dashRefreshLbl').textContent = 'Updating…';
  const sid = fav.serviceId || fav.svcSnapshot?.serviceID || fav.svcSnapshot?.serviceIdUrlSafe;

  try {
    let svc = fav.svcSnapshot || {};
    let detail = null;

    if (sid) {
      try {
        detail = await xhrGet(apiUrl(`/service/${encodeURIComponent(sid)}`));
      } catch(e) {
        // Service may have completed or expired — keep snapshot data
      }
    }

    // Merge any fresh data from the service endpoint over the snapshot
    const merged = {
      ...svc,
      ...(detail || {}),
      serviceID: sid,
    };

    const pts = detail
      ? buildPtsFromService(detail, merged)
      : (svc.subsequentCallingPoints ? buildPtsFromSnapshot(svc) : []);

    renderDashboard(merged, pts, fav);
    const now = new Date();
    document.getElementById('dashRefreshLbl').textContent =
      `Updated ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  } catch(e) {
    document.getElementById('dashBody').innerHTML =
      `<div class="dash-error">Couldn't load live data right now. Will retry automatically.</div>`;
    document.getElementById('dashRefreshLbl').textContent = 'Update failed';
  }
}

// Build calling-points from a stored snapshot (no fresh service detail)
function buildPtsFromSnapshot(svc) {
  const pts = [{
    name: svc.origin?.[0]?.locationName || curFrom,
    crs: svc.origin?.[0]?.crs || curFc,
    planned: svc.std, est: svc.etd, actual: svc.atd, plt: svc.platform, isOri: true,
  }];
  const next = (svc.subsequentCallingPoints || [])
    .flatMap(g => Array.isArray(g.callingPoint) ? g.callingPoint : [g.callingPoint])
    .filter(Boolean);
  next.forEach(cp => pts.push({
    name: cp.locationName || cp.crs, crs: cp.crs,
    planned: cp.st, est: cp.et, actual: cp.at, plt: cp.platform,
    passed: !!(cp.at && cp.at !== 'No report' && cp.at !== 'On time'),
  }));
  return pts;
}

function renderDashboard(svc, pts, fav) {
  const body = document.getElementById('dashBody');
  const etd = svc.etd || svc.std || '';
  const isCx = svc.isCancelled || etd === 'Cancelled';
  const isLate = !isCx && etd && etd !== 'On time' && etd !== svc.std;

  // Status calculation
  let statusText, statusCls;
  if (isCx) { statusText = 'Cancelled'; statusCls = 'cxl'; }
  else if (isLate) {
    const [sh, sm] = (svc.std || '00:00').split(':').map(Number);
    const [eh, em] = etd.split(':').map(Number);
    let delay = (eh * 60 + em) - (sh * 60 + sm);
    if (delay < -60) delay += 1440; // overnight rollover
    statusText = delay > 0 ? `${delay} min late` : 'Delayed';
    statusCls = 'late';
  } else {
    statusText = 'On time';
    statusCls = 'ontime';
  }

  // Carriage count from API formation data
  let carriages = '—';
  if (svc.length) carriages = `${svc.length}`;
  else if (svc.formation?.coaches?.length) carriages = `${svc.formation.coaches.length}`;

  // Operator display
  const opBadge = operatorBadge(svc.operatorCode || fav.operatorCode, svc.operator || fav.operator || '');

  // Find live position: last passed stop and next upcoming stop
  let lastPassedIdx = -1;
  pts.forEach((p, i) => {
    if (p.actual && p.actual !== 'No report' && p.actual !== 'On time') lastPassedIdx = i;
    else if (p.passed) lastPassedIdx = i;
  });
  const nextIdx = Math.min(lastPassedIdx + 1, pts.length - 1);
  const hasMoved = lastPassedIdx >= 0;
  const isComplete = lastPassedIdx >= pts.length - 1;

  // Position bar percentage
  let posPct = 0;
  if (hasMoved && !isComplete && pts.length > 1) {
    posPct = ((lastPassedIdx + 0.5) / (pts.length - 1)) * 100;
  } else if (isComplete) {
    posPct = 100;
  }

  // Position card content
  let positionHTML = '';
  if (pts.length >= 2) {
    const fromStop = hasMoved && !isComplete ? pts[lastPassedIdx] : pts[0];
    const toStop = hasMoved && !isComplete ? pts[nextIdx] : pts[pts.length - 1];
    const fromTime = formatStopTime(fromStop);
    const toTime = formatStopTime(toStop);
    const statusLine = isCx ? 'Service cancelled'
      : isComplete ? `Completed at <strong>${toStop.name}</strong>`
      : !hasMoved ? `Departing from <strong>${pts[0].name}</strong> at ${pts[0].planned || '—'}`
      : `Between <strong>${fromStop.name}</strong> and <strong>${toStop.name}</strong>`;

    // Build dots for each stop along the bar
    const dots = pts.map((p, i) => {
      const pct = (i / (pts.length - 1)) * 100;
      const passed = i <= lastPassedIdx;
      return `<div class="dash-pos-dot ${passed ? 'passed' : ''}" style="left:${pct}%"></div>`;
    }).join('');

    positionHTML = `
      <div class="dash-card dash-pos">
        <div class="dash-pos-lbl">Live position</div>
        <div class="dash-pos-bar">
          <div class="dash-pos-fill" style="width:${posPct}%"></div>
          ${dots}
          ${hasMoved && !isComplete ? `<div class="dash-pos-train" style="left:${posPct}%">🚂</div>` : ''}
        </div>
        <div class="dash-pos-ends">
          <div class="dash-pos-end">
            <div class="dash-pos-end-nm">${pts[0].name}</div>
            <div class="dash-pos-end-time">${pts[0].planned || ''}</div>
          </div>
          <div class="dash-pos-end right">
            <div class="dash-pos-end-nm">${pts[pts.length-1].name}</div>
            <div class="dash-pos-end-time">${pts[pts.length-1].planned || ''}</div>
          </div>
        </div>
        <div class="dash-pos-status">${statusLine}</div>
      </div>`;
  }

  // Calling points table
  const stopsHTML = pts.length ? pts.map((pt, i) => {
    const isFirst = i === 0;
    const isLast  = i === pts.length - 1;
    const isPassed = i <= lastPassedIdx && !isCx;
    const isCurrent = !isCx && !isComplete && i === nextIdx && hasMoved;
    const isCancelled = isCx || pt.est === 'Cancelled';

    const hasActual = pt.actual && pt.actual !== 'No report' && pt.actual !== 'On time';
    const hasEst = !hasActual && pt.est && pt.est !== 'No report' && pt.est !== 'On time' && pt.est !== pt.planned;
    const onTime = !hasActual && !hasEst && !isCancelled;

    let timeBlock;
    if (isCancelled) {
      timeBlock = `<div class="dash-stop-planned no-strike">${pt.planned || '—'}</div>
                   <div class="dash-stop-actual cxl">Cancelled</div>`;
    } else if (hasActual) {
      timeBlock = `<div class="dash-stop-planned">${pt.planned || '—'}</div>
                   <div class="dash-stop-actual ${pt.actual === pt.planned ? 'ontime' : 'late'}">${pt.actual}</div>`;
    } else if (hasEst) {
      timeBlock = `<div class="dash-stop-planned">${pt.planned || '—'}</div>
                   <div class="dash-stop-actual late">${pt.est} <span style="font-weight:500;font-size:9px;opacity:0.7;">est.</span></div>`;
    } else {
      timeBlock = `<div class="dash-stop-planned no-strike">${pt.planned || '—'}</div>`;
    }

    const platform = pt.plt
      ? `<div class="dash-stop-plt">Platform <strong>${pt.plt}</strong></div>`
      : (isFirst || isLast) ? `<div class="dash-stop-plt">Platform TBC</div>` : '';

    const classes = ['dash-stop'];
    if (isPassed && !isCurrent) classes.push('passed');
    if (isCurrent) classes.push('current');

    return `
      <div class="${classes.join(' ')}">
        <div class="dash-stop-marker"></div>
        <div class="dash-stop-info">
          <div class="dash-stop-name">${pt.name}</div>
          ${platform}
        </div>
        <div class="dash-stop-times">${timeBlock}</div>
      </div>`;
  }).join('') : '<div class="dash-error">No calling points available</div>';

  body.innerHTML = `
    <div class="dash-card">
      <div class="dash-route">
        <div class="dash-route-text">${fav.from.split(' ')[0]} <span class="dash-route-arrow">→</span> ${fav.to.split(' ')[0]}</div>
        ${opBadge}
      </div>
      <div class="dash-meta">
        <div class="dash-meta-blk">
          <div class="dash-meta-lbl">Departure</div>
          <div class="dash-meta-val">${svc.std || fav.dep || '—'}</div>
          <div class="dash-meta-sub">${svc.platform ? 'Platform ' + svc.platform : 'Platform TBC'}</div>
        </div>
        <div class="dash-meta-blk">
          <div class="dash-meta-lbl">Status</div>
          <div class="dash-meta-val ${statusCls}">${statusText}</div>
          <div class="dash-meta-sub">${carriages !== '—' ? carriages + ' coaches' : 'Length unknown'}</div>
        </div>
      </div>
    </div>
    ${positionHTML}
    <div class="dash-sec-lbl">All stops</div>
    <div class="dash-stops">${stopsHTML}</div>
  `;
}

function formatStopTime(pt) {
  if (pt.actual && pt.actual !== 'No report' && pt.actual !== 'On time') return pt.actual;
  if (pt.est && pt.est !== 'No report' && pt.est !== 'On time') return pt.est;
  return pt.planned || '—';
}

document.getElementById('dashBack').addEventListener('click', closeDashboard);

// ════════════════════════════════════════
// FAVOURITES PANEL
// ════════════════════════════════════════
document.getElementById('favsBtn').addEventListener('click', () => {
  renderFavPanel(); document.getElementById('panelOverlay').classList.add('open');
});
document.getElementById('pnBody').addEventListener('click', e => {
  const del = e.target.closest('[data-del]');
  if (del) {
    favourites.splice(parseInt(del.dataset.del), 1);
    sv('favs2', favourites); renderFavStrip(); renderFavPanel(); return;
  }
  const row = e.target.closest('.fav-row');
  if (row) {
    const f = favourites[parseInt(row.dataset.i)]; if (!f) return;
    document.getElementById('panelOverlay').classList.remove('open');
    openDashboard(f);
  }
});

// ════════════════════════════════════════
// CLOSE OVERLAYS
// ════════════════════════════════════════
document.getElementById('shClose').addEventListener('click', () => document.getElementById('sheetOverlay').classList.remove('open'));
document.getElementById('sheetOverlay').addEventListener('click', e => { if(e.target===document.getElementById('sheetOverlay')) document.getElementById('sheetOverlay').classList.remove('open'); });
document.getElementById('pnClose').addEventListener('click', () => document.getElementById('panelOverlay').classList.remove('open'));
document.getElementById('panelOverlay').addEventListener('click', e => { if(e.target===document.getElementById('panelOverlay')) document.getElementById('panelOverlay').classList.remove('open'); });

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
renderPopular();
renderRecent();
renderFavStrip();
document.getElementById('versionLbl').textContent = `v${APP_VERSION}`;
</script>
