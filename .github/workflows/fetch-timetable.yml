name: Fetch Timetable Data

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run timetable fetch
        env:
          NR_USER: ${{ secrets.NR_USER }}
          NR_PASS: ${{ secrets.NR_PASS }}
        run: python scripts/fetch_timetable.py

      - name: Commit timetable.json and logos
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add timetable.json logos/
          git diff --cached --quiet || git commit -m "chore: update timetable and logos $(date -u +%Y-%m-%d)"
          git push
