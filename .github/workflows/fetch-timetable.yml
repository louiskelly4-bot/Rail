name: Fetch Timetable Data

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC every morning (after NR publishes at ~6am)
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30     # full schedule parsing can take ~10 mins

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run timetable fetch script
        run: python scripts/fetch_timetable.py

      - name: Commit timetable.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add timetable.json
          git diff --cached --quiet || git commit -m "chore: update timetable $(date -u +%Y-%m-%d)"
          git push
